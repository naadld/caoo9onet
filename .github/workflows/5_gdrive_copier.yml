name: 5. GDrive Folder Copier

on:
  workflow_dispatch:

jobs:
  copy_gdrive_folders:
    name: Copy GDrive Folders from Google Sheet (Col B -> Col C)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "."
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 gspread oauth2client google-api-python-client google-auth

      - name: Install Rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF_DATA }}
          EOF

      - name: Configure Google Credentials
        run: |
          cat << 'EOF' > credentials.json
          ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Run GDrive Folder Copier (Step 5)
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 -u scripts/step5_gdrive_copier.py
