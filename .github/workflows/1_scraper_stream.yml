name: 1. Abeka Video Scraper & GDrive Streamer

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      max_days:
        description: 'Maximum days to process'
        required: false
        default: '170'
      grade:
        description: 'Specific Grade (e.g. Grade 1, K4, 05)'
        required: false
        default: ''
      day:
        description: 'Specific Day (e.g. 10, 150)'
        required: false
        default: ''
      force:
        description: 'Force re-download and overwrite'
        required: false
        default: 'false'

concurrency:
  group: abeka-scraper-stream-${{ github.event.inputs.grade || 'all' }}
  cancel-in-progress: false

jobs:
  scrape_and_stream:
    name: Scrape o9o Videos & Stream to GDrive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "."
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📢 Report Substep 1 to Paperclip
        run: |
          python3 scripts/sync_paperclip_live.py --step step1 --status "SUBSTEP_1" --msg "🔹 [SUBSTEP 1/4] Checkout Code & Setup Python 3.12 environment completed."

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 gspread oauth2client yt-dlp google-api-python-client google-auth

      - name: Install Rclone & FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF_DATA }}
          EOF

      - name: Configure Google Credentials
        run: |
          cat << 'EOF' > credentials.json
          ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: 📢 Report Substep 2 to Paperclip
        run: |
          python3 scripts/sync_paperclip_live.py --step step1 --status "SUBSTEP_2" --msg "🔹 [SUBSTEP 2/4] FFmpeg, Rclone & GCP Credentials configured successfully."

      - name: Run Scraper & Stream to GDrive (Step 1)
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          MAX_DAYS="${{ github.event.inputs.max_days }}"
          GRADE="${{ github.event.inputs.grade }}"
          DAY="${{ github.event.inputs.day }}"
          FORCE="${{ github.event.inputs.force }}"

          CMD="python3 -u scripts/step1_direct_stream.py"
          if [ -n "$MAX_DAYS" ]; then
            CMD="$CMD --max-days $MAX_DAYS"
          fi
          if [ -n "$GRADE" ]; then
            CMD="$CMD --grade \"$GRADE\""
          fi
          if [ -n "$DAY" ]; then
            CMD="$CMD --day \"$DAY\""
          fi
          if [ "$FORCE" = "true" ]; then
            CMD="$CMD --force"
          fi

          echo "Running command: $CMD"
          eval $CMD

      - name: Generate AI Subtitles & Interactive JSON (Step 4)
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          pip install faster-whisper eng-to-ipa deep-translator
          python3 -u scripts/step4_generate_subtitles.py --folder "Grade 5"

      - name: 📢 Report Workflow Completion to Paperclip
        if: always()
        run: |
          python3 scripts/sync_paperclip_live.py --step step1 --status "WORKFLOW_COMPLETED" --msg "🎉 [SUBSTEP 4/4] Entire GitHub Actions Cloud Workflow finished processing."

