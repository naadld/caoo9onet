name: 1. Abeka Video Scraper & GDrive Streamer

on:
  schedule:
    # Run every 3 hours automatically
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      max_days:
        description: 'Maximum days to process'
        required: true
        default: '170'

concurrency:
  group: abeka-scraper-stream-group
  cancel-in-progress: false

jobs:
  scrape_and_stream:
    name: Scrape o9o Videos & Stream to GDrive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "."
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 gspread oauth2client yt-dlp google-api-python-client google-auth

      - name: Install Rclone & FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONF_DATA }}
          EOF

      - name: Configure Google Credentials
        run: |
          cat << 'EOF' > credentials.json
          ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Run Scraper & Stream to GDrive (Step 1)
        run: |
          MAX_DAYS="${{ github.event.inputs.max_days || '170' }}"
          python3 -u scripts/step1_direct_stream.py --max-days "$MAX_DAYS"

      - name: Generate AI Subtitles & Interactive JSON (Step 4)
        run: |
          pip install faster-whisper eng-to-ipa deep-translator
          python3 -u scripts/step4_generate_subtitles.py --folder "Grade 4"

